<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Transfer System - Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="hero-panel">
        <p class="eyebrow">Secure Transfer Platform</p>
        <h1>Move Your Event Tickets with Confidence</h1>
        <p>
          List available tickets, request transfers, and manage approvals in one streamlined
          dashboard powered by Firebase.
        </p>
      </section>

      <section class="auth-panel">
        <div class="auth-head">
          <h2 id="authTitle">Welcome Back</h2>
          <p id="authSubtitle">Sign in to access your dashboard and marketplace.</p>
        </div>

        <form id="authForm" class="auth-form" novalidate>
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com" />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            required
            minlength="6"
            autocomplete="current-password"
            placeholder="At least 6 characters"
          />

          <div id="nicknameWrap" class="hidden">
            <label for="nickname">Nickname</label>
            <input
              type="text"
              id="nickname"
              maxlength="24"
              autocomplete="nickname"
              placeholder="How others will see you"
            />
          </div>

          <div id="confirmWrap" class="confirm-wrap hidden">
            <label for="confirmPassword">Confirm Password</label>
            <input
              type="password"
              id="confirmPassword"
              minlength="6"
              autocomplete="new-password"
              placeholder="Re-enter your password"
            />
          </div>

          <button id="submitButton" class="btn btn-primary" type="submit">Sign In</button>
          <p id="formMessage" class="form-message" role="status" aria-live="polite"></p>
        </form>

        <button id="toggleMode" class="link-button" type="button">Need an account? Register</button>
      </section>
    </main>

    <script type="module" src="js/index.js"></script>
  </body>
</html>
